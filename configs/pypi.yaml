version: 1
project_root: ..
progress: true

# Shared collector configuration. PyPI files pass through the same validation,
# SHA256 deduplication, provenance manifest, and data/raw layout as other sources.
corpus_collection:
  output_directory: data/raw
  provenance_manifest: data/raw/collection_manifest.jsonl
  report: data/raw/collection_report.json
  log_file: logs/python_corpus_collector.log
  minimum_file_bytes: 80
  maximum_file_bytes: 250000
  git_timeout_seconds: 300
  automatic_imports:
    enabled: false
  ignored_directories:
    - .git
    - .hg
    - .svn
    - .tox
    - .nox
    - .venv
    - venv
    - env
    - __pycache__
    - build
    - dist
    - site-packages
    - .eggs
    - "*.egg-info"
    - .mypy_cache
    - .pytest_cache
    - .ruff_cache
    - generated
    - autogenerated
    - vendor
    - vendors
    - third_party
  generated_file_patterns:
    - "*_generated.py"
    - "generated_*.py"
    - "*_pb2.py"
    - "*_pb2_grpc.py"
    - "*_ui.py"
    - versioneer.py
  generated_content_markers:
    - "@generated"
    - auto-generated
    - autogenerated
    - automatically generated
    - generated by
    - do not edit
  sources: []

# Rebuild the existing searchable Corpus Manager index after each import. The
# manager also detects duplicate functions/classes and classifies Python files.
corpus_expansion:
  index: data/raw/corpus_index.sqlite3
  report: data/raw/corpus_expansion_report.json
  collect_before_index: false

pypi_corpus:
  # Disabled by default because selecting packages and licenses is an approval
  # decision. Review the lists below, then set enabled: true.
  enabled: false
  approval: Approved by the configured PyPI package and license policy
  progress: true

  api:
    base_url: https://pypi.org/pypi
    simple_index_url: https://pypi.org/simple/
    top_packages_url: https://hugovk.github.io/top-pypi-packages/top-pypi-packages.min.json
    request_timeout_seconds: 30
    retries: 4
    retry_backoff_seconds: 2.0
    user_agent: GenPy-PyPI-Corpus-Builder/1

  selection:
    top_downloaded: false
    top_downloaded_limit: 1000
    minimum_downloads: 0
    keywords: []
    # Keyword discovery scans at most this many names from the PyPI Simple API.
    keyword_scan_limit: 2000
    categories:
      scientific: []
      web: []
      data: []
      tooling: []
    enabled_categories: []
    requirements_files: []
    manual_packages: []
    maximum_packages: 10000
    # Exact, case-insensitive matches against license metadata.
    ignored_licenses: []

  download:
    directory: data/pypi/downloads
    workers: 8
    retries: 4
    timeout_seconds: 120
    retry_backoff_seconds: 2.0
    resume: true

  extraction:
    # Per-run extraction trees are created here and deleted automatically.
    directory: data/pypi/extraction
    workers: 8
    maximum_members: 200000
    maximum_expanded_bytes: 2000000000
    ignore_migrations: true
    ignored_directories:
      - tests
      - test
      - docs
      - examples
      - demo
      - benchmarks
      - build
      - dist
      - node_modules
      - __pycache__
      - venv
      - .venv
      - vendor
      - vendors
      - vendored
      - third_party
      - external

  # Reuse the existing source cleaner for binary-like, minified, low-signal,
  # generated, and path quality checks. License enforcement remains separately
  # configurable from the discovery ignore list.
  cleaner:
    enabled: true
    require_known_license: false
    accepted_licenses:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - Unlicense
      - MPL-2.0

  deduplication:
    # Exact SHA256 deduplication is always supplied by the existing collector.
    normalized: true
    near_duplicate: false
    near_duplicate_distance: 3
    index: data/pypi/duplicate_index.sqlite3

  tokenization:
    # This is the existing Phase 5 tokenizer. It is loaded, never retrained.
    tokenizer: data/tokenizer/tokenizer.json
    output_directory: data/pretraining
    shard_prefix: shard
    index: index.json
    statistics: statistics.json
    document_index: pypi_document_index.jsonl
    max_tokens_per_shard: 10000000
    workers: 0
    max_pending_tasks_per_worker: 4

  paths:
    checkpoint: data/pypi/checkpoint.sqlite3
    report_directory: reports
    log_file: logs/pypi_corpus_builder.jsonl

logging:
  level: INFO
