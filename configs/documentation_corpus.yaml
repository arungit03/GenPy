version: 1
project_root: ..

documentation_corpus:
  corpus_root: python_corpus
  source_directories:
    - docs
    - peps
    - tutorials
  tokenizer: data/tokenizer/tokenizer.json

  min_file_size: 80
  max_file_size: 2000000
  allowed_extensions:
    - .md
    - .rst
    - .html
    - .txt

  ignored_directories:
    - .git
    - .github
    - __pycache__
    - node_modules
    - venv
    - .venv
    - env
    - ENV
    - build
    - dist
    - _build
    - site

  ignored_suffixes:
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .pdf
    - .zip
    - .exe
    - .dll
    - .so
    - .bin

  deduplication: true

  packing:
    context_length: 1024
    max_tokens_per_shard: 10000000
    shard_prefix: documentation
    add_bos: false
    add_eos: true
    document_boundary: eos
    pad_final_sequence: false
