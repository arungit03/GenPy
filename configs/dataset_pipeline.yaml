version: 1

# Relative paths are resolved from this configuration file's directory.
project_root: ..
progress: true

paths:
  workspace: data/dataset_pipeline
  final_directory: data/fine_tuning
  log_file: logs/dataset_pipeline.log

# Optional ingestion layer. Run `python scripts/collect_python_corpus.py` before
# the dataset builder after adding an approved source. Files already placed in
# data/raw are validated and registered automatically.
corpus_collection:
  output_directory: data/raw
  provenance_manifest: data/raw/collection_manifest.jsonl
  report: data/raw/collection_report.json
  log_file: logs/python_corpus_collector.log
  minimum_file_bytes: 1
  maximum_file_bytes: 250000
  git_timeout_seconds: 300
  manual_license:
  # Every first-level directory below data/imports is automatically registered
  # as an approved local source. Git checkouts retain their exact commit SHA.
  # Top-level ZIP archives are supported as well. Optional per-repository
  # metadata can be supplied in .genpy-corpus.yaml.
  automatic_imports:
    enabled: true
    directory: data/imports
    approval: Explicitly approved by placement in the GenPy imports directory
    default_license:
    metadata_file: .genpy-corpus.yaml
    discover_zip_archives: true
    include:
      - "**/*.py"
    exclude: []
  ignored_directories:
    - .git
    - .hg
    - .svn
    - .tox
    - .nox
    - .venv
    - venv
    - env
    - ENV
    - __pycache__
    - build
    - dist
    - site-packages
    - .eggs
    - "*.egg-info"
    - .mypy_cache
    - .pytest_cache
    - .ruff_cache
    - generated
    - autogenerated
  generated_file_patterns:
    - "*_generated.py"
    - "generated_*.py"
    - "*_pb2.py"
    - "*_pb2_grpc.py"
    - "*_ui.py"
    - versioneer.py
  generated_content_markers:
    - "@generated"
    - auto-generated
    - autogenerated
    - automatically generated
    - generated by
    - do not edit
  # These two local roots are already approved below for GenPy dataset use.
  # Add local, local-Git, or ZIP collections only after provenance/license review.
  sources:
    - id: genpy_library
      type: local
      location: src/genpy_llm
      license:
      approval: GenPy project source explicitly approved for corpus population
      include:
        - "**/*.py"
      exclude:
        - "**/__pycache__/**"
    - id: genpy_scripts
      type: local
      location: scripts
      license:
      approval: GenPy project scripts explicitly approved for corpus population
      include:
        - "**/*.py"
      exclude:
        - "**/__pycache__/**"

# Rebuildable classification/index layer over the validated raw corpus. Running
# expand_python_corpus.py imports configured sources before rebuilding by default.
corpus_expansion:
  index: data/raw/corpus_index.sqlite3
  report: data/raw/corpus_expansion_report.json
  collect_before_index: true

corpus_population:
  report: data/raw/corpus_population_report.json

# Phase 5.5A GitHub corpus ingestion. Enable only after reviewing the search and
# license allowlist. Authentication is read from GITHUB_TOKEN and is never saved.
github_corpus:
  enabled: false
  approval: Approved by the configured GitHub repository and license policy
  progress: true
  api:
    base_url: https://api.github.com
    token_env: GITHUB_TOKEN
    request_timeout_seconds: 30
    retries: 4
    retry_backoff_seconds: 2.0
    maximum_rate_limit_wait_seconds: 300
    user_agent: GenPy-GitHub-Corpus-Builder/1
  search:
    language: Python
    minimum_stars: 100
    updated_after: 2020-01-01
    updated_before:
    include_archived: false
    include_forks: false
    allowed_licenses:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
    # Each term is combined with language, stars, dates, archive/fork, and
    # license filters. Date windows are subdivided around GitHub's 1,000-result cap.
    queries:
      - ""
    maximum_repositories: 10000
    results_per_page: 100
  download:
    cache_directory: data/github_cache
    workers: 8
    timeout_seconds: 600
    shallow: true
    resume: true
    refresh_existing: false
  filters:
    include_test_fixtures: false
    exclude_vendor_code: true
    additional_exclude:
      - "**/migrations/**"
      - "**/benchmarks/data/**"
  tokenization:
    tokenizer: data/tokenizer/tokenizer.json
    output_directory: data/pretraining/github
    shard_index: shard_index.json
    statistics: token_statistics.json
    max_tokens_per_shard: 10000000
    workers: 0
    max_pending_tasks_per_worker: 4
  paths:
    checkpoint: data/github_corpus/checkpoint.sqlite3
    report_directory: reports/github_corpus
    log_file: logs/github_corpus_builder.jsonl

collection:
  # Phase 4 consumes the validated, provenance-tracked raw corpus. New material
  # reaches this directory only through the approved corpus collector.
  approved_sources:
    - id: raw_python_corpus
      path: data/raw
      repository: Approved raw Python corpus
      approval: Files explicitly placed in or collected into data/raw
      license:
      include:
        - "**/*.py"
      exclude:
        - "**/__pycache__/**"
        - "**/.venv/**"
        - "**/venv/**"
        - "**/build/**"
        - "**/dist/**"

cleaning:
  minimum_file_bytes: 80
  maximum_file_bytes: 250000
  require_python_definitions: true

instruction_generation:
  # Existing docstrings remain instructions. Undocumented definitions receive
  # deterministic instructions inferred only from their AST and source text.
  require_docstring: false
  include_functions: true
  include_async_functions: true
  include_classes: true
  include_methods: true
  include_private: true
  minimum_instruction_characters: 8
  maximum_instruction_characters: 8000
  maximum_output_bytes: 100000
  # Candidate selection is stable by content hash and seed. Sixteen examples
  # per usable source file targets roughly 50K-100K records for the current
  # 6,142-file corpus without manufacturing duplicate examples.
  maximum_examples_per_file: 16
  selection_seed: 42
  enabled_categories:
    - code_generation
    - explanation
    - bug_fixing
    - refactoring
    - documentation
    - unit_testing
    - optimization
    - complexity_analysis
    - type_hints
    - code_completion
    - api_usage
  templates:
    code_generation: "{base_instruction}"
    explanation: "Explain the behavior of the {kind} `{qualified_name}`."
    bug_fixing: "Fix the bug in the provided implementation of `{qualified_name}`."
    refactoring: "Refactor `{qualified_name}` into clear, modern Python without changing behavior."
    documentation: "Write concise API documentation for `{qualified_name}`."
    unit_testing: "Implement the existing unit test `{qualified_name}`."
    optimization: "Optimize `{qualified_name}` while preserving its observable behavior."
    complexity_analysis: "Analyze the time and auxiliary-space complexity of `{qualified_name}`."
    type_hints: "Add the demonstrated type hints to `{qualified_name}`."
    code_completion: "Complete the missing body of `{qualified_name}`."
    api_usage: "Demonstrate how `{qualified_name}` uses the `{api}` API."

validation:
  minimum_instruction_characters: 8
  maximum_instruction_characters: 8000
  minimum_output_characters: 1
  maximum_output_bytes: 100000
  require_python_syntax: true
  require_provenance: true
  fail_on_invalid: true

split:
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  # All examples from one source file stay in one split to prevent leakage.
  group_by: source_file

performance:
  # Zero selects up to eight local CPU cores. Results remain input-order
  # deterministic and queued AST work stays bounded per worker.
  workers: 0
  max_pending_tasks_per_worker: 4
  # Exact deduplication, uniqueness validation, and splitting use disposable
  # disk-backed SQLite indexes committed in bounded batches.
  sqlite_batch_size: 1000
  # Enable for a full SHA-256 scan on every resumed stage. The default uses
  # size/mtime signatures while still recording hashes for built artifacts.
  verify_output_hashes_on_resume: false

logging:
  level: INFO
