"scripts/generate_instruction_pairs.py" = ["E402", "I001"]
"scripts/deduplicate_dataset.py" = ["E402", "I001"]
"scripts/validate_dataset.py" = ["E402", "I001"]
"scripts/split_dataset.py" = ["E402", "I001"]
"scripts/build_dataset.py" = ["E402", "I001"]
"scripts/collect_python_corpus.py" = ["E402", "I001"]
"scripts/expand_python_corpus.py" = ["E402", "I001"]
"scripts/populate_python_corpus.py" = ["E402", "I001"]
"scripts/build_github_corpus.py" = ["E402", "I001"]
"scripts/build_pypi_corpus.py" = ["E402", "I001"]
"scripts/build_pretraining_corpus.py" = ["E402", "I001"]
"scripts/pretrain_gpt.py" = ["E402", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
